<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="J Sailing Kirjanpito">
<title>J Sailing — Kirjanpito 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --vihrea:#16302a;--vihrea2:#2d5a40;--kulta:#c8a060;--taustaF:#f2ede3;--taustaK:#fff9f0;
  --teksti:#333;--harmaa:#888;--reunus:#d4c8b0;--font:"Palatino Linotype","Book Antiqua",Palatino,serif;
  --plus:#1a6030;--minus:#8b2020;
}
body{font-family:var(--font);background:var(--taustaF);color:var(--teksti);min-height:100vh}

/* ── HEADER ── */
.header{background:var(--vihrea);color:#e8dcc0;padding:12px 16px 0;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-top{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.header-nimi{font-size:17px;font-weight:bold}
.header-sub{font-size:10px;opacity:.6;margin-top:1px}
.header-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* ── NAV ── */
.nav{display:flex;gap:1px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-btn{border:none;padding:8px 12px;cursor:pointer;white-space:nowrap;font-size:11px;font-family:var(--font);border-radius:4px 4px 0 0;transition:all .12s;background:transparent;color:#9abaaa;font-weight:normal}
.nav-btn.active{background:var(--taustaF);color:var(--vihrea);font-weight:bold}

/* ── MAIN ── */
.main{max-width:1040px;margin:0 auto;padding:16px 12px}

/* ── TOAST ── */
.toast{position:fixed;top:12px;right:12px;z-index:9999;background:var(--vihrea);color:#e8dcc0;padding:9px 16px;border-radius:8px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.35);pointer-events:none;display:none}
.toast.show{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

/* ── KORTIT ── */
.card{background:var(--taustaK);border:1px solid var(--reunus);border-radius:8px;overflow:hidden;margin-bottom:11px}
.card-header{padding:6px 12px;font-size:11px;font-weight:bold;color:#fff}
.card-body{padding:10px 12px}

/* ── KUUKAUSIPALKKI ── */
.kk-grid{display:grid;grid-template-columns:180px 1fr;gap:13px;align-items:start}
.kk-lista{background:var(--taustaK);border:1px solid var(--reunus);border-radius:8px;padding:5px;position:sticky;top:62px}
.kk-btn{display:block;width:100%;text-align:left;border:none;cursor:pointer;background:transparent;color:var(--teksti);border-radius:4px;padding:5px 8px;margin-bottom:1px;font-family:var(--font);font-size:12px;transition:background .1s}
.kk-btn.active{background:var(--vihrea);color:#e8dcc0}
.kk-btn-row{display:flex;justify-content:space-between;align-items:baseline}
.kk-total{padding:6px 8px 3px;border-top:1px solid var(--reunus);margin-top:4px}

/* ── PIKAINFO ── */
.pikainfo{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.pika{background:var(--taustaK);border:1px solid var(--reunus);border-radius:5px;padding:5px 9px;min-width:82px}
.pika-label{font-size:8px;text-transform:uppercase;letter-spacing:.5px;color:var(--harmaa);margin-bottom:1px}
.pika-arvo{font-size:11px;font-family:monospace;font-weight:normal}
.pika-arvo.bold{font-weight:bold}

/* ── TAULUKOT ── */
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid var(--reunus)}
th{padding:3px 5px;text-align:left;color:#555;font-size:11px;font-weight:600}
th.r{text-align:right}
td{padding:2px 4px;vertical-align:middle}
td.r{text-align:right;font-family:monospace}
.tr-even{background:#f8fff6}
.tr-odd{background:#f0faf0}
.tr-even-g{background:#fffef8}
.tr-odd-g{background:#f5f0e8}

/* ── LOMAKKEET ── */
input,select,textarea{font-family:var(--font);font-size:12px;padding:3px 5px;border:1px solid var(--reunus);border-radius:3px;background:#fffef8;color:var(--teksti)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--kulta);outline-offset:1px}
label.lbl{font-size:10px;color:#666;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.form-col{display:flex;flex-direction:column;gap:7px}

/* ── NAPIT ── */
.btn{border:none;cursor:pointer;font-family:var(--font);border-radius:4px;transition:opacity .1s}
.btn:hover{opacity:.85}
.btn-prim{background:var(--vihrea);color:#e8dcc0;padding:5px 11px;font-size:11px}
.btn-sec{background:rgba(255,255,255,.15);color:#e8dcc0;padding:5px 10px;font-size:11px}
.btn-warn{background:rgba(180,60,60,.4);color:#e8dcc0;padding:5px 10px;font-size:11px}
.btn-green{background:#1a5028;color:#fff;padding:4px 10px;font-size:11px}
.btn-brown{background:#7a4a10;color:#fff;padding:4px 10px;font-size:11px}
.btn-blue{background:#3a5a8a;color:#fff;padding:4px 10px;font-size:11px}
.btn-sm{background:var(--vihrea);color:#e8dcc0;padding:3px 7px;font-size:11px;border-radius:3px}
.btn-del{background:none;border:none;cursor:pointer;color:#c04040;font-size:14px;padding:0 3px}
.btn-excel{background:#2d7040;color:#fff;padding:5px 10px;font-size:11px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal-box{background:var(--taustaK);border-radius:10px;padding:20px 22px;min-width:320px;max-width:440px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.modal-title{font-size:15px;font-weight:bold;color:var(--vihrea);margin-bottom:14px}
.modal-btns{display:flex;gap:7px;justify-content:flex-end;margin-top:14px}

/* ── ALV / TILINPÄÄTÖS ── */
.alv-row{display:flex;justify-content:space-between;padding:2px 0;font-size:12px}
.alv-row.bold{font-weight:bold}
.alv-row.korostus span{color:#7a4a10}
.tp-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px dotted #ddd;font-size:12px}
.tp-row.bold{font-weight:bold}
.tp-row.sisennys{padding-left:13px}
.infobanner{background:#e8f0ff;border:1px solid #a0b8e8;border-radius:5px;padding:7px 11px;font-size:11px;color:#2a4a8a;margin-top:9px}

/* ── SYNKRONOITU BADGE ── */
.sync-badge{font-size:10px;padding:2px 7px;border-radius:10px;background:#dcf0dc;color:#1a6030}
.sync-badge.syncing{background:#fff3dc;color:#7a5010}

/* ── TUONTI-PALKKI ── */
.tuonti-bar{background:#fff3dc;border:1px solid #c8a060;border-radius:6px;padding:10px 14px;margin-bottom:12px;font-size:12px}

/* ── LOADER ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px;color:var(--harmaa)}
.loader-ring{width:40px;height:40px;border:3px solid #d4c8b0;border-top-color:var(--vihrea);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PALKIT ── */
.bar-chart{display:flex;align-items:flex-end;height:72px;gap:2px}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer}
.bar{width:100%;border-radius:2px 2px 0 0;min-height:1px}
.bar-label{font-size:8px;color:var(--harmaa);margin-top:2px}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .kk-grid{grid-template-columns:1fr}
  .kk-lista{position:static;display:flex;flex-wrap:wrap;gap:3px;padding:6px}
  .kk-btn{width:auto;padding:4px 8px}
  .form-grid{grid-template-columns:1fr}
}
@media print{
  .header,.nav,.btn,.modal-overlay{display:none!important}
  body,div{background:white!important}
}
</style>
</head>
<body>
<div id="app"><div class="loader"><div class="loader-ring"></div><div class="loader-text">Ladataan…</div></div></div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,collection,doc,addDoc,setDoc,deleteDoc,updateDoc,onSnapshot,query,where,orderBy,serverTimestamp,getDocs}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── CONFIG ────────────────────────────────────────────────────────────────────
const FIREBASE_CONFIG={
  apiKey:"AIzaSyB7Dp5_5fN0Iko-4Jn1D2Dp6NNNih63UO0",
  authDomain:"jsailing-f716c.firebaseapp.com",
  projectId:"jsailing-f716c",
  storageBucket:"jsailing-f716c.firebasestorage.app",
  messagingSenderId:"543523103696",
  appId:"1:543523103696:web:439a312efa6aec398a8fd5"
};
const ALLOWED_EMAIL="jacke.seilaa@gmail.com";
const APP_VERSION="V2.0 — 6.4.2026 klo 20:45";
const VUOSI="2026";

// ── LAKISÄÄTEISET VAKIOT ──────────────────────────────────────────────────────
// Kirjanpitolaki: tositteet säilytettävä 6 vuotta tilikauden päättymisestä
const SAILITYS_VUOSIA=6;
// ALV-ilmoitusten eräpäivät kvartaaleittain
const ALV_ERAPAIVAT=["12.4.2026","12.7.2026","12.10.2026","12.1.2027"];
// Veroilmoituksen eräpäivä (Lomake 5)
const VEROILMOITUS_ERAPAIVA="1.4.2027";
// Ennakkoveron eräpäivät 2026
const ENNAKKOVERO_ERAPAIVAT=["10.3.2026","10.6.2026","10.9.2026","10.11.2026"];

// ── FIREBASE INIT ─────────────────────────────────────────────────────────────
const app=initializeApp(FIREBASE_CONFIG);
const auth=getAuth(app);
const db=getFirestore(app);

// ── VAKIOT ────────────────────────────────────────────────────────────────────
const KUUKAUDET=["Tammikuu","Helmikuu","Maaliskuu","Huhtikuu","Toukokuu","Kesäkuu","Heinäkuu","Elokuu","Syyskuu","Lokakuu","Marraskuu","Joulukuu"];
const KK3=["Tam","Hel","Maa","Huh","Tou","Kes","Hei","Elo","Syy","Lok","Mar","Jou"];
const ALV_KANNAT=[
  {label:"25,5 % — yleinen (kurssit, tavarat)",value:0.255},
  {label:"13,5 % — elintarvikkeet, ravintolat",value:0.135},
  {label:"10 % — charter, henkilökuljetus",value:0.10},
  {label:"0 % — viranomaistutkinnot",value:0},
];
const MENO_KAT=[
  {id:"aineet",label:"Aineet ja tarvikkeet"},
  {id:"palkat",label:"Palkat"},
  {id:"sivukulut",label:"Henkilösivukulut"},
  {id:"vuokrat",label:"Vuokrat"},
  {id:"matkat",label:"Matkakulut"},
  {id:"markkinointi",label:"Markkinointi"},
  {id:"toimisto",label:"Toimistokulut"},
  {id:"vakuutukset",label:"Vakuutukset"},
  {id:"yel",label:"YEL-maksut"},
  {id:"poistot",label:"Poistot"},
  {id:"muut",label:"Muut kulut"},
];

// ── TILA ──────────────────────────────────────────────────────────────────────
let state={
  user:null, tab:"dashboard", valittuKk:new Date().getMonth(),
  kkData:{},
  sailings:[], tutkinnot_tilaukset:[], invoices:[],
  laskut:[], tositteet:[], asiakkaat:[],
  modal:null, syncing:false, syncMsg:"",
  seuraavaTositeNro:1,
  kmAjot:[], // Kilometrikorvausajot
  yritys:{nimi:"J Sailing / Jarmo",ytunnus:"1728993-9",iban:"FI62 1132 3000 4277 43",email:"jacke.seilaa@gmail.com",kotipaikka:"Loviisa"},
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
const fmt=(n,d=2)=>Number(n||0).toLocaleString("fi-FI",{minimumFractionDigits:d,maximumFractionDigits:d});
const fmtD=iso=>{if(!iso)return"";const d=new Date(iso);return`${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()}`};
const tv=t=>t>=0?"var(--plus)":"var(--minus)";
const laskeMA=r=>r.reduce((s,x)=>s+(Number(x.veroton)||0)*x.alvKanta,0);
const laskeMV=r=>r.reduce((s,x)=>s+(Number(x.veroton)||0),0);
const laskeOA=r=>r.reduce((s,x)=>s+(Number(x.veroton)||0)*x.alvKanta,0);
const laskeMe=m=>MENO_KAT.reduce((s,k)=>s+Number(m[k.id]||0),0);
const laskeVero=t=>t<=0?0:t<20000?t*.08:t<40000?t*.22:t<60000?t*.30:t*.37;

function tyhjäKk(){
  return{
    myyntiRivit:[{id:Date.now(),kuvaus:"",alvKanta:0.255,veroton:""}],
    ostoRivit:[{id:Date.now()+1,kuvaus:"",alvKanta:0.255,veroton:""}],
    menot:Object.fromEntries(MENO_KAT.map(k=>[k.id,""])),
    muutTulot:"",muistiinpanot:""
  };
}

function kkSumma(i){
  const d=state.kkData[i]||tyhjäKk();
  const mv=laskeMV(d.myyntiRivit),ma=laskeMA(d.myyntiRivit);
  const oa=laskeOA(d.ostoRivit),me=laskeMe(d.menot);
  const mt=Number(d.muutTulot||0);
  return{myyntiVeroton:mv,myyntiAlv:ma,ostoAlv:oa,menot:me,muutTulot:mt,tulos:mv+mt-me,alvMaksettava:ma-oa};
}

function vuosiSummat(){
  const ss=Array.from({length:12},(_,i)=>kkSumma(i));
  return{
    myyntiVeroton:ss.reduce((s,k)=>s+k.myyntiVeroton,0),
    muutTulot:ss.reduce((s,k)=>s+k.muutTulot,0),
    menot:ss.reduce((s,k)=>s+k.menot,0),
    tulos:ss.reduce((s,k)=>s+k.tulos,0),
    menotPer:Object.fromEntries(MENO_KAT.map(k=>[k.id,
      Array.from({length:12},(_,i)=>Number((state.kkData[i]||tyhjäKk()).menot[k.id]||0)).reduce((a,b)=>a+b,0)
    ])),
    ss,
  };
}

function kvartaalit(){
  return[0,1,2,3].map(q=>{
    const kks=[q*3,q*3+1,q*3+2];
    const ss=kks.map(i=>kkSumma(i));
    return{
      myyntiAlv:ss.reduce((s,k)=>s+k.myyntiAlv,0),
      ostoAlv:ss.reduce((s,k)=>s+k.ostoAlv,0),
      myyntiVeroton:ss.reduce((s,k)=>s+k.myyntiVeroton,0),
      maksettava:ss.reduce((s,k)=>s+k.alvMaksettava,0),
    };
  });
}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}

// ── FIRESTORE TALLENNNUS ──────────────────────────────────────────────────────
let saveTimer={};
async function tallenna(kk){
  clearTimeout(saveTimer[kk]);
  saveTimer[kk]=setTimeout(async()=>{
    if(!state.user)return;
    try{
      const ref=doc(db,`kirjanpito/${VUOSI}/kuukaudet/${kk}`);
      await setDoc(ref,{...state.kkData[kk],paivitetty:serverTimestamp()});
    }catch(e){console.error("Tallennus epäonnistui",e);}
  },900);
}

async function tallennaMeta(kenttä,arvo){
  if(!state.user)return;
  const ref=doc(db,`kirjanpito/${VUOSI}/meta/yritys`);
  await setDoc(ref,{[kenttä]:arvo},{merge:true});
}

// ── FIRESTORE KUUNTELU ────────────────────────────────────────────────────────
let unsubs=[];
function aloitaKuuntelu(){
  unsubs.forEach(u=>u());unsubs=[];

  // Kuukausidata
  for(let i=0;i<12;i++){
    const kk=i;
    const u=onSnapshot(doc(db,`kirjanpito/${VUOSI}/kuukaudet/${kk}`),snap=>{
      if(snap.exists()){
        const d=snap.data();
        state.kkData[kk]={
          myyntiRivit:d.myyntiRivit||[{id:Date.now(),kuvaus:"",alvKanta:0.255,veroton:""}],
          ostoRivit:d.ostoRivit||[{id:Date.now()+1,kuvaus:"",alvKanta:0.255,veroton:""}],
          menot:d.menot||Object.fromEntries(MENO_KAT.map(k=>[k.id,""])),
          muutTulot:d.muutTulot||"",
          muistiinpanot:d.muistiinpanot||"",
        };
      } else {
        if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
      }
      if(state.tab==="kuukaudet"||state.tab==="yhteenveto"||state.tab==="alv")render();
    });
    unsubs.push(u);
  }

  // Tilaukset-sovelluksesta — purjehdukset (sailings)
  const uSailings=onSnapshot(collection(db,"sailings"),snap=>{
    state.sailings=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.tab==="tuonti")render();
  });
  unsubs.push(uSailings);

  // Tilaukset-sovelluksesta — tutkinnot
  const uTutkinnot=onSnapshot(collection(db,"tutkinnot"),snap=>{
    state.tutkinnot_tilaukset=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.tab==="tuonti")render();
  });
  unsubs.push(uTutkinnot);

  // Tilaukset-sovelluksesta — laskut
  const uInvoices=onSnapshot(collection(db,"invoices"),snap=>{
    state.invoices=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.tab==="tuonti")render();
  });
  unsubs.push(uInvoices);

  // Kirjanpidon omat laskut
  const uLaskut=onSnapshot(collection(db,`kirjanpito/${VUOSI}/laskut`),snap=>{
    state.laskut=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.tab==="laskutus")render();
  });
  unsubs.push(uLaskut);

  // Tositteet
  const uTositteet=onSnapshot(collection(db,`kirjanpito/${VUOSI}/tositteet`),snap=>{
    state.tositteet=snap.docs.map(d=>({id:d.id,...d.data()}));
    if(state.tab==="tositeet")render();
  });
  unsubs.push(uTositteet);

  // Asiakkaat (jaettu tilaukset-sovelluksen kanssa)
  const uAsiakkaat=onSnapshot(collection(db,"customers"),snap=>{
    state.asiakkaat=snap.docs.map(d=>({id:d.id,...d.data()}));
  });
  unsubs.push(uAsiakkaat);

  // Yritystiedot
  const uYritys=onSnapshot(doc(db,`kirjanpito/${VUOSI}/meta/yritys`),snap=>{
    if(snap.exists()) state.yritys={...state.yritys,...snap.data()};
  });
  unsubs.push(uYritys);

  // Km-ajot
  const uKm=onSnapshot(doc(db,`kirjanpito/${VUOSI}/meta/kmajot`),snap=>{
    if(snap.exists()) state.kmAjot=snap.data().ajot||[];
    if(state.tab==="km"||state.tab==="dashboard") render();
  });
  unsubs.push(uKm);

  // Tositenumero laskuri
  const uNro=onSnapshot(doc(db,`kirjanpito/${VUOSI}/meta/laskurit`),snap=>{
    if(snap.exists()&&snap.data().seuraavaTositeNro) state.seuraavaTositeNro=snap.data().seuraavaTositeNro;
  });
  unsubs.push(uNro);
}

// ── TUONTI TILAUKSET → KIRJANPITO ─────────────────────────────────────────────
// Tilaukset-sovelluksen Firestore-rakenne (V9.11):
//   sailings: {name, date, endDate, type, pricePerPerson, reservationFee, maxPersons, ...}
//   customers: {name, phone, email, sailingId, tutkintoId, reservationStatus, billTo, companyId}
//   invoices: {invoiceNo, invoiceDate, payerName, eventName, vatRatePct, net, vat, grossTotal, paid, itype}
//   tutkinnot: {type, date, pricePerPerson, location, notes, maxPersons}
//   companies: {name, businessId, email, commissionPct}

// Laske purjehduksen kokonaistulo osallistujista
function laskePurjehduksenTulo(sailing){
  const vahvistetut=state.customers.filter(c=>c.sailingId===sailing.id&&c.reservationStatus==="paid");
  const hinta=Number(sailing.pricePerPerson||0);
  return vahvistetut.length * hinta;
}

async function tuoSailing(sailing){
  const kk=new Date((sailing.date||today())+"T12:00:00").getMonth();
  if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
  // Charter 10%, muut 25,5%
  const alvKanta=sailing.type==="Charter"?0.10:0.255;
  const vahvistetut=state.customers.filter(c=>c.sailingId===sailing.id&&c.reservationStatus==="paid");
  const hinta=Number(sailing.pricePerPerson||0);
  const veroton=vahvistetut.length * hinta || hinta; // fallback jos ei asiakkaita
  const osallistujat=vahvistetut.length>0?vahvistetut.map(c=>c.name).join(", "):"";
  const kuvaus=`${sailing.type||"Purjehdus"} — ${sailing.name||""}${osallistujat?` (${osallistujat})`:""}`;
  const uusiRivi={id:Date.now(),kuvaus,alvKanta,veroton:veroton.toFixed(2),_sailingId:sailing.id};
  state.kkData[kk].myyntiRivit.push(uusiRivi);
  await tallenna(kk);
  showToast(`⛵ ${sailing.name||sailing.type} tuotu ${KUUKAUDET[kk]}lle — ${veroton.toFixed(2)} €`);
  render();
}

async function tuoTutkinto(t){
  const kk=new Date((t.date||today())+"T12:00:00").getMonth();
  if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
  // Tutkinnot ALV 0% (viranomaistutkinnot)
  const vahvistetut=state.customers.filter(c=>c.tutkintoId===t.id&&c.reservationStatus==="paid");
  const hinta=Number(t.pricePerPerson||0);
  const veroton=vahvistetut.length * hinta || hinta;
  const osallistujat=vahvistetut.length>0?vahvistetut.map(c=>c.name).join(", "):"";
  const kuvaus=`Tutkinto: ${t.type||""}${t.boatType?" ("+t.boatType+")":""}${osallistujat?" — "+osallistujat:""}`;
  const uusiRivi={id:Date.now(),kuvaus,alvKanta:0,veroton:veroton.toFixed(2),_tutkintoId:t.id};
  state.kkData[kk].myyntiRivit.push(uusiRivi);
  await tallenna(kk);
  showToast(`⚓ Tutkinto tuotu ${KUUKAUDET[kk]}lle — ${veroton.toFixed(2)} €`);
  render();
}

async function tuoLasku(inv){
  const kk=new Date((inv.invoiceDate||today())+"T12:00:00").getMonth();
  if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
  // Käytä tilaukset-sovelluksen laskun nettoarvoa suoraan
  const veroton=Number(inv.net||0);
  // vatRatePct tulee tilaukset-sovelluksesta suoraan (25.5 tai 13.5)
  const alvKanta=Number(inv.vatRatePct||25.5)/100;
  // Älä tuo hyvityslaskuja tai varausmaksuja tulona — ne kirjataan erikseen
  if(inv.isCredit||inv.itype==="credit") return;
  const kuvaus=`Lasku ${inv.invoiceNo||""} — ${inv.payerName||""} — ${inv.eventName||""}`;
  const uusiRivi={id:Date.now(),kuvaus,alvKanta,veroton:veroton.toFixed(2),_invoiceId:inv.id};
  state.kkData[kk].myyntiRivit.push(uusiRivi);
  await tallenna(kk);
  showToast(`🧾 Lasku ${inv.invoiceNo} tuotu ${KUUKAUDET[kk]}lle — ${veroton.toFixed(2)} €`);
  render();
}

async function tuoKaikki(){
  // Kerää jo tuodut ID:t (vältetään duplikaatit)
  const tuodutSailing=new Set(Object.values(state.kkData).flatMap(d=>d.myyntiRivit.map(r=>r._sailingId)).filter(Boolean));
  const tuodutInvoice=new Set(Object.values(state.kkData).flatMap(d=>d.myyntiRivit.map(r=>r._invoiceId)).filter(Boolean));
  const tuodutTutkinto=new Set(Object.values(state.kkData).flatMap(d=>d.myyntiRivit.map(r=>r._tutkintoId)).filter(Boolean));
  let lkm=0;

  // Tuo maksetut laskut tilaukset-sovelluksesta (ensisijainen lähde)
  for(const inv of state.invoices){
    if(tuodutInvoice.has(inv.id)) continue;
    if(!inv.paid) continue; // vain maksetut
    if(inv.isCredit||inv.itype==="credit") continue; // ei hyvityslaskuja
    const vuosi=String(inv.invoiceDate||"").slice(0,4);
    if(vuosi!==VUOSI) continue; // vain oikea vuosi
    await tuoLasku(inv); lkm++;
  }

  // Tuo tutkinnot joilla on hinta mutta joita ei ole laskutettu
  for(const t of state.tutkinnot){
    if(tuodutTutkinto.has(t.id)) continue;
    if(!t.pricePerPerson||Number(t.pricePerPerson)===0) continue;
    const vuosi=String(t.date||"").slice(0,4);
    if(vuosi!==VUOSI) continue;
    const vahvistetut=state.customers.filter(c=>c.tutkintoId===t.id&&c.reservationStatus==="paid");
    if(vahvistetut.length===0) continue;
    await tuoTutkinto(t); lkm++;
  }

  showToast(lkm>0?`✅ Tuotiin ${lkm} merkintää kirjanpitoon`:"ℹ️ Ei uusia tuotavia merkintöjä");
  render();
}

function vieCSV(){
  const vs=vuosiSummat();
  const rows=[
    ["Kuukausi","Myynti (veroton)","Muut tulot","Kulut","Tulos","ALV suoritettava","ALV vähennettävä","ALV maksettava"],
    ...Array.from({length:12},(_,i)=>{const s=vs.ss[i];return[KUUKAUDET[i],s.myyntiVeroton,s.muutTulot,s.menot,s.tulos,s.myyntiAlv,s.ostoAlv,s.alvMaksettava];}),
    [],
    ["YHTEENSÄ",vs.myyntiVeroton,vs.muutTulot,vs.menot,vs.tulos,
      kvartaalit().reduce((s,q)=>s+q.myyntiAlv,0),
      kvartaalit().reduce((s,q)=>s+q.ostoAlv,0),
      kvartaalit().reduce((s,q)=>s+q.maksettava,0)],
  ];
  const csv=rows.map(r=>r.map(v=>typeof v==="number"?v.toFixed(2):String(v||"")).join(";")).join("\n");
  const blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`kirjanpito_${VUOSI}.csv`;a.click();
  showToast("📊 CSV ladattu (avaa Excelissä)");
}

// ── LAKISÄÄTEISET MUISTUTUKSET ────────────────────────────────────────────────
function maaraaikamuistutukset(){
  const tänään=new Date();
  const muistutukset=[];
  // ALV-ilmoitukset
  ALV_ERAPAIVAT.forEach((ep,i)=>{
    const d=new Date(ep.split(".").reverse().join("-"));
    const paivia=Math.ceil((d-tänään)/86400000);
    if(paivia>0&&paivia<=30) muistutukset.push({tyyppi:"alv",teksti:`⚠️ ALV Q${i+1} eräpäivä ${ep} — ${paivia} pv`,väri:"#fef3c7",raja:"#c8a060"});
    else if(paivia<=0&&paivia>-7) muistutukset.push({tyyppi:"alv",teksti:`🚨 ALV Q${i+1} erääntyi ${ep}!`,väri:"#fee2e2",raja:"#e08080"});
  });
  // Veroilmoitus
  const vi=new Date(VEROILMOITUS_ERAPAIVA.split(".").reverse().join("-"));
  const viPv=Math.ceil((vi-tänään)/86400000);
  if(viPv>0&&viPv<=60) muistutukset.push({tyyppi:"vero",teksti:`📋 Veroilmoitus (Lomake 5) eräpäivä ${VEROILMOITUS_ERAPAIVA} — ${viPv} pv`,väri:"#e8f0ff",raja:"#a0b8e8"});
  // Ennakkovero
  ENNAKKOVERO_ERAPAIVAT.forEach((ep,i)=>{
    const d=new Date(ep.split(".").reverse().join("-"));
    const pv=Math.ceil((d-tänään)/86400000);
    if(pv>0&&pv<=14) muistutukset.push({tyyppi:"ennakko",teksti:`🏛 Ennakkovero ${i+1}. erä eräpäivä ${ep} — ${pv} pv`,väri:"#fef3c7",raja:"#c8a060"});
  });
  return muistutukset;
}

    <div class="pika" style="min-width:auto"><div class="pika-label">Liikevaihto ${VUOSI}</div><div class="pika-arvo bold" style="color:var(--plus);font-size:16px">${fmt(vs.myyntiVeroton)} €</div></div>
    <div class="pika" style="min-width:auto"><div class="pika-label">Kulut ${VUOSI}</div><div class="pika-arvo bold" style="color:var(--minus);font-size:16px">${fmt(vs.menot)} €</div></div>
    <div class="pika" style="min-width:auto"><div class="pika-label">Tulos ${VUOSI}</div><div class="pika-arvo bold" style="color:${tv(vs.tulos)};font-size:16px">${fmt(vs.tulos)} €</div></div>
    <div class="pika" style="min-width:auto"><div class="pika-label">Tositteet</div><div class="pika-arvo bold" style="font-size:16px">${state.tositteet.length} kpl</div></div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px">
    <div class="card">
      <div class="card-header" style="background:#1a5028">📅 ${KUUKAUDET[nytKk]} ${VUOSI}</div>
      <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
          ${[["Myynti",nytS.myyntiVeroton,"var(--plus)"],["Kulut",nytS.menot,"var(--minus)"],["Tulos",nytS.tulos,tv(nytS.tulos)],["ALV",nytS.alvMaksettava,"#7a5010"]].map(([l,v,c])=>`
          <div style="text-align:center;padding:6px;background:#f8fff8;border-radius:5px">
            <div style="font-size:9px;text-transform:uppercase;color:var(--harmaa)">${l}</div>
            <div style="font-size:14px;font-weight:bold;font-family:monospace;color:${c}">${fmt(v)} €</div>
          </div>`).join("")}
        </div>
        <button class="btn btn-green" style="width:100%;margin-top:8px" onclick="setTab('kuukaudet')">Kirjaa ${KUUKAUDET[nytKk]} →</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header" style="background:#3a3a2a">⚖️ Lakisääteiset velvoitteet</div>
      <div class="card-body">
        <div style="font-size:11px;line-height:1.8">
          <div>📎 Tositteiden säilytys: <strong>6 vuotta</strong></div>
          <div style="color:var(--harmaa);font-size:10px;margin-left:16px">Säilytä vähintään <strong>${sailytysPaattyy}</strong> asti</div>
          <div style="margin-top:4px">📋 Veroilmoitus: <strong>${VEROILMOITUS_ERAPAIVA}</strong></div>
          <div style="margin-top:4px">💶 ALV-ilmoitukset: <strong>neljännesvuosittain</strong></div>
          <div style="color:var(--harmaa);font-size:10px;margin-left:16px">Q1: 12.4 · Q2: 12.7 · Q3: 12.10 · Q4: 12.1</div>
          <div style="margin-top:4px">🏛 Ennakkovero: <strong>4 kertaa/vuosi</strong></div>
          <div style="color:var(--harmaa);font-size:10px;margin-left:16px">3/3 · 10/6 · 10/9 · 10/11</div>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header" style="background:#555">⚡ Pikakirjaus</div>
    <div class="card-body">
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btn-green" onclick="setTab('kuukaudet')">📅 Kuukausikirjanpito</button>
        <button class="btn btn-prim" style="background:#7a4a10" onclick="setModal('tosite')">📎 + Tosite</button>
        <button class="btn btn-prim" style="background:#2d5a8a" onclick="setTab('km')">🚗 + Km-ajo</button>
        <button class="btn btn-prim" style="background:#1a5028" onclick="setTab('tuonti')">🔄 Tuo tilaukset</button>
      </div>
    </div>
  </div>

  <div style="background:#fffef8;border:1px solid var(--reunus);border-radius:6px;padding:10px 13px;font-size:11px;color:var(--harmaa)">
    ⚠️ <strong>Kokeiluversio V2.0</strong> — Tämä on harjoitteluohjelma. Virallinen kirjanpito aloitetaan kun tuot nykyiset tulos- ja taselaskelmat sisään. Ohjelma ei korvaa ammattitilitoimistoa — suositellaan tarkistuttamaan tiedot kirjanpitäjällä.
  </div>`;
}

// ── PÄÄNÄKYMÄ ─────────────────────────────────────────────────────────────────
function renderApp(){
  const vs=vuosiSummat();
  const TABS=[
    ["dashboard","🧭 Dashboard"],
    ["kuukaudet","📅 Kuukausittain"],
    ["tuonti","🔄 Tuonti"],
    ["km","🚗 Km-korvaukset"],
    ["alv","💶 ALV"],
    ["yhteenveto","📊 Vuosikoonti"],
    ["tilinpaatos","📋 Tilinpäätös"],
  ];

  let sisältö="";
  if(state.tab==="dashboard") sisältö=renderDashboard();
  else if(state.tab==="kuukaudet") sisältö=renderKuukaudet();
  else if(state.tab==="tuonti") sisältö=renderTuonti();
  else if(state.tab==="km") sisältö=renderKmKorvaukset();
  else if(state.tab==="alv") sisältö=renderAlv();
  else if(state.tab==="yhteenveto") sisältö=renderYhteenveto();
  else if(state.tab==="tilinpaatos") sisältö=renderTilinpäätös();

  document.getElementById("app").innerHTML=`
    <div>
      <header class="header">
        <div class="header-top">
          <div>
            <div class="header-nimi">⚓ ${state.yritys.nimi}</div>
            <div class="header-sub">Y-tunnus ${state.yritys.ytunnus} · Kirjanpito ${VUOSI} · ${APP_VERSION}</div>
          </div>
          <div class="header-btns">
            <span class="sync-badge${state.syncing?" syncing":""}">${state.syncing?"⟳ Synkronoidaan":"☁ Tallennettu"}</span>
            <button class="btn btn-excel" onclick="vieCSV()">📊 CSV</button>
            <button class="btn btn-warn btn" onclick="window.signOutUser()">Kirjaudu ulos</button>
          </div>
        </div>
        <nav class="nav">
          ${TABS.map(([id,lbl])=>`<button class="nav-btn${state.tab===id?" active":""}" onclick="setTab('${id}')">${lbl}</button>`).join("")}
        </nav>
      </header>
      <main class="main">${sisältö}</main>
      ${renderModal()}
    </div>`;
}

function render(){
  if(!state.user){renderLogin();return;}
  renderApp();
}

function renderLogin(){
  document.getElementById("app").innerHTML=`
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:20px;padding:20px">
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:8px">⚓</div>
        <h1 style="color:var(--vihrea);font-size:24px;margin-bottom:4px">J Sailing — Kirjanpito</h1>
        <p style="color:var(--harmaa);font-size:13px">Tilikausi ${VUOSI} · Sama Firebase kuin tilaukset-sovellus</p>
      </div>
      <button onclick="kirjaudu()" style="background:var(--vihrea);color:#e8dcc0;border:none;padding:12px 28px;border-radius:8px;font-size:15px;cursor:pointer;font-family:var(--font)">
        🔑 Kirjaudu Google-tilillä
      </button>
    </div>`;
}

// ── GLOBAALIT FUNKTIOT ────────────────────────────────────────────────────────
window.setTab=t=>{state.tab=t;render();}
window.setKk=i=>{state.valittuKk=i;render();}
window.setModal=m=>{state.modal=m;render();}

window.updKk=(k,v)=>{
  const kk=state.valittuKk;
  if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
  state.kkData[kk][k]=v;
  tallenna(kk);
  // Päivitä vain pikainfo ilman full render
  const s=kkSumma(kk);
  const pikat=document.querySelectorAll(".pika-arvo");
  if(pikat[0]) pikat[0].textContent=fmt(s.myyntiVeroton)+" €";
  if(pikat[1]) pikat[1].textContent=fmt(s.menot)+" €";
  if(pikat[2]){pikat[2].textContent=fmt(s.tulos)+" €";pikat[2].style.color=tv(s.tulos);}
  if(pikat[3]) pikat[3].textContent=fmt(s.alvMaksettava)+" €";
}

window.updRivi=(typ,idx,k,v)=>{
  const kk=state.valittuKk;
  if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
  const key=typ==="myynti"?"myyntiRivit":"ostoRivit";
  state.kkData[kk][key][idx]={...state.kkData[kk][key][idx],[k]:typ==="myynti"&&k==="alvKanta"?Number(v):v};
  tallenna(kk);
  // Päivitä ALV-sarake ilman full render
  const rivi=state.kkData[kk][key][idx];
  const alv=(Number(rivi.veroton)||0)*rivi.alvKanta;
  const rivit=document.querySelectorAll(typ==="myynti"?"tbody:first-of-type tr":"tbody:last-of-type tr");
}

window.updMeno=(id,v)=>{
  const kk=state.valittuKk;
  if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
  state.kkData[kk].menot[id]=v;
  tallenna(kk);
}

window.lisääRivi=typ=>{
  const kk=state.valittuKk;
  if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
  const key=typ==="myynti"?"myyntiRivit":"ostoRivit";
  state.kkData[kk][key].push({id:Date.now(),kuvaus:"",alvKanta:0.255,veroton:""});
  tallenna(kk);render();
}

window.poistaRivi=(typ,idx)=>{
  const kk=state.valittuKk;
  const key=typ==="myynti"?"myyntiRivit":"ostoRivit";
  state.kkData[kk][key].splice(idx,1);
  tallenna(kk);render();
}

window.kopioi=()=>{
  const kk=state.valittuKk;
  if(kk===0)return;
  const ed=state.kkData[kk-1]||tyhjäKk();
  if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
  state.kkData[kk].menot={...ed.menot};
  tallenna(kk);render();
  showToast(`📋 Menot kopioitu ${KK3[kk-1]}:lta`);
}

window.tuoSailingById=id=>{const s=state.sailings.find(x=>x.id===id);if(s)tuoSailing(s);}
window.tuoTutkintoById=id=>{const t=state.tutkinnot_tilaukset.find(x=>x.id===id);if(t)tuoTutkinto(t);}
window.tuoLaskuById=id=>{const inv=state.invoices.find(x=>x.id===id);if(inv)tuoLasku(inv);}
window.tuoKaikki=tuoKaikki;
window.vieCSV=vieCSV;

window.tallennaTositeModa=async()=>{
  const pvm=document.getElementById("t-pvm").value;
  const kuvaus=document.getElementById("t-kuvaus").value;
  const summa=document.getElementById("t-summa").value;
  const tyyppi=document.getElementById("t-tyyppi").value;
  const kk=Number(document.getElementById("t-kk").value);
  const alvKanta=Number(document.getElementById("t-alv")?.value||0);
  const toimittaja=document.getElementById("t-toimittaja")?.value||"";
  if(!kuvaus||!summa){showToast("⚠️ Täytä kuvaus ja summa");return;}
  const nro=tositeNro();
  const t={
    id:Date.now().toString(), nro, pvm, kuvaus, summa, tyyppi, kk,
    alvKanta, toimittaja,
    lisätty:new Date().toISOString(),
    sailytysParattyy:new Date(Number(VUOSI)+SAILITYS_VUOSIA+1,0,1).toISOString(),
  };
  if(state.user) await addDoc(collection(db,`kirjanpito/${VUOSI}/tositteet`),t);
  else state.tositteet.push(t);
  if(tyyppi==="meno"&&summa){
    const katEl=document.querySelector("#t-kategoria select")||document.querySelector("[id='t-kategoria']");
    const kat=katEl?.value||"muut";
    const kk2=kk;
    if(!state.kkData[kk2]) state.kkData[kk2]=tyhjäKk();
    const ny=Number(state.kkData[kk2].menot[kat]||0);
    state.kkData[kk2].menot[kat]=(ny+Number(summa)).toFixed(2);
    await tallenna(kk2);
  }
  showToast(`📎 Tosite ${nro} tallennettu — säilytä ${new Date(Number(VUOSI)+SAILITYS_VUOSIA+1,0,1).toLocaleDateString("fi-FI")} asti`);
  setModal(null);
};

window.lisääKmAjo=async()=>{
  const pvm=document.getElementById("km-pvm")?.value||"";
  const reitti=document.getElementById("km-reitti")?.value||"";
  const km=document.getElementById("km-km")?.value||"";
  const tarkoitus=document.getElementById("km-tarkoitus")?.value||"";
  if(!km||!reitti){showToast("⚠️ Täytä reitti ja km");return;}
  const ajo={id:Date.now().toString(),pvm,reitti,km:Number(km),tarkoitus,korvaus:laskeKmKorvaus(km)};
  if(!state.kmAjot) state.kmAjot=[];
  state.kmAjot.push(ajo);
  if(state.user){
    const ref=doc(db,`kirjanpito/${VUOSI}/meta/kmajot`);
    await setDoc(ref,{ajot:state.kmAjot},{merge:false});
  }
  showToast(`🚗 ${fmt(Number(km),0)} km lisätty — korvaus ${fmt(laskeKmKorvaus(km))} €`);
  render();
};

window.poistaKmAjo=async(idx)=>{
  if(!confirm("Poistetaanko ajo?"))return;
  state.kmAjot.splice(idx,1);
  if(state.user){
    const ref=doc(db,`kirjanpito/${VUOSI}/meta/kmajot`);
    await setDoc(ref,{ajot:state.kmAjot},{merge:false});
  }
  render();
};

window.kirjaaKmMenoksi=async()=>{
  const yht=state.kmAjot.reduce((s,a)=>s+Number(a.km||0),0);
  const korvaus=laskeKmKorvaus(yht);
  if(korvaus<=0){showToast("Ei ajoja kirjattavaksi");return;}
  const kk=state.valittuKk;
  if(!state.kkData[kk]) state.kkData[kk]=tyhjäKk();
  const ny=Number(state.kkData[kk].menot.matkat||0);
  state.kkData[kk].menot.matkat=(ny+korvaus).toFixed(2);
  await tallenna(kk);
  showToast(`✅ ${fmt(korvaus)} € km-korvaukset kirjattu matkakuluihin (${KUUKAUDET[kk]})`);
  render();
};

// ── AUTH ──────────────────────────────────────────────────────────────────────
window.kirjaudu=async()=>{
  const provider=new GoogleAuthProvider();
  try{await signInWithPopup(auth,provider);}
  catch(e){showToast("Kirjautuminen epäonnistui: "+e.message);}
}

window.signOutUser=async()=>{
  unsubs.forEach(u=>u());unsubs=[];
  await signOut(auth);
  state.user=null;state.kkData={};
  render();
}

onAuthStateChanged(auth,user=>{
  if(user&&user.email===ALLOWED_EMAIL){
    state.user=user;
    aloitaKuuntelu();
    render();
  } else if(user){
    signOut(auth);
    showToast("⛔ Ei oikeuksia: "+user.email);
    renderLogin();
  } else {
    state.user=null;
    renderLogin();
  }
});

</script>
</body>
</html>
